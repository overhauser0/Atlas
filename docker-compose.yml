version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: atlas-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - atlas-net
  atlas-server:
    build: ./atlas-server
    container_name: atlas-server
    restart: always
    environment:
      PORT: 5676
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID}
      NOTION_MONTHLY_DB_ID: ${NOTION_MONTHLY_DB_ID}
      NOTION_WEEKLY_DB_ID: ${NOTION_WEEKLY_DB_ID}
      ATLAS_API_KEY: ${ATLAS_API_KEY}
    volumes:
      - ./atlas-server:/app # コードをマウント（ホットリロード用）
      - /app/node_modules # NASとの同期から除外（高速化）
    ports:
      - '5676:5676'
    depends_on:
      - db
    networks:
      - atlas-net
  frontend:
    build: ./gleis
    container_name: gleis
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    volumes:
      - ./gleis:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '5675:5675'
    depends_on:
      - atlas-server
    networks:
      - atlas-net
  trails:
    build: ./trails
    container_name: trails
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    volumes:
      - ./trails:/app # コードをマウント（ホットリロード用）
      - /app/node_modules # NASとの同期から除外（高速化）
    ports:
      - '5677:5677'
    depends_on:
      - atlas-server
    networks:
      - atlas-net

networks:
  atlas-net:
    driver: bridge
